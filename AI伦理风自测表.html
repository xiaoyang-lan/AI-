            position: relative;

        }

            opacity: 0;
            position: absolute;
            top: 30px;
            left: -10px;
            background: white;
            border: 1px solid #ccdbe9;
            padding: 16px 18px;
            border-radius: 16px;

            font-size: 13px;

            transition: opacity 0.15s, visibility 0.15s;
            pointer-events: none;
            white-space: normal;
            text-align: left;

    <div id="categories"></div>

    <div class="score-summary">
        <div>

        </div>
        <div>
            <div class="risk-level" id="riskLevel">未评级</div>
        </div>
        <div class="risk-desc" id="riskDesc"></div>
        <button class="reset-btn" id="resetBtn">↻ 重置所有评分为3分</button>
    </div>
    <div class="footer-note">
        评分参考：1=完全不符合，2=部分符合，3=基本符合，4=较好符合，5=完全符合。权重总和为100%。
    </div>
</div>

    // 存储所有指标项用于计算

    function render() {
        const container = document.getElementById('categories');
        let html = '';
        categories.forEach(cat => {
            html += '<div class="category">';
            html += `<h2>${cat.name}</h2>`;
            html += `<div class="category-weight">一级权重 ${cat.weight}%</div>`;

            cat.subcategories.forEach(sub => {
                html += '<div class="subcategory">';
                html += `<h3>${sub.name} <span class="subcat-weight">二级权重 ${sub.weight}%</span></h3>`;

                sub.indicators.forEach(ind => {
                    const id = `ind_${cat.name}_${sub.name}_${ind.name}`.replace(/\s/g, '_');
                    indicatorItems.push({
                        id: id,
                        weight: ind.weight / 100
                    });

                    // 获取该指标的标准描述
                    const desc = descriptionsMap[ind.name] || ['无详细描述'];
                    const tooltipHtml = desc.map((line, idx) => `<li><strong>${idx + 1}分：</strong>${line.replace(/^[1-5]分：/, '')}</li>`).join('');

                    html += '<div class="indicator-row">';
                    html += '<div class="indicator-info">';
                    html += `<span class="indicator-name">${ind.name}</span>`;
                    html += `<span class="indicator-weight">${ind.weight}%</span>`;
                    html += `<div class="info-icon">ⓘ<div class="tooltip"><ul style="margin:0; padding-left:18px;">${tooltipHtml}</ul></div></div>`;
                    html += '</div>';
                    html += '<div class="indicator-select">';
                    html += `<select id="${id}">`;
                    for (let i = 1; i <= 5; i++) {
                        html += `<option value="${i}">${i}分</option>`;
                    }
                    html += '</select>';
                    html += '</div>';
                    html += '</div>';
                });
                html += '</div>';
            });
            html += '</div>';
        });
        container.innerHTML = html;
    }

    function calculateTotal() {
        let total = 0;
        indicatorItems.forEach(item => {
            const select = document.getElementById(item.id);
            if (select) {
                total += parseFloat(select.value) * item.weight;
            }
        });
        return total;
    }

    function updateScore() {
        const total = calculateTotal();
        document.getElementById('totalScore').innerText = total.toFixed(2);
        let level = '', desc = '';
        if (total >= 4.0) {
            level = '低风险 🟢';
            desc = '系统伦理表现优秀，风险极低。可考虑进一步优化细节，保持领先。';
        } else if (total >= 3.0) {
            level = '中风险 🟡';
            desc = '存在一定风险，建议针对得分较低且权重高的指标优先整改。';
        } else {
            level = '高风险 🔴';
            desc = '风险较高，系统不宜直接上线，需全面优化并重新评估。';
        }
        document.getElementById('riskLevel').innerText = level;
        document.getElementById('riskDesc').innerText = desc;
    }

    function resetAll() {
        indicatorItems.forEach(item => {
            const select = document.getElementById(item.id);
            if (select) select.value = '3';
        });
        updateScore();
    }

    function bindEvents() {
        indicatorItems.forEach(item => {
            const select = document.getElementById(item.id);
            if (select) {
                select.addEventListener('change', updateScore);
            }
        });
        document.getElementById('resetBtn').addEventListener('click', resetAll);
    }

    render();
    bindEvents();
    resetAll();
